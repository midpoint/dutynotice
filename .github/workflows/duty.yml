name: Duty Notice

on:
  schedule:
    # 每周日到周五上午6点运行 (UTC = 北京时间 - 8)
    # 所以设置为 UTC 22:00 = 北京时间次日 06:00
    - cron: '0 22 * * 0-5'
  workflow_dispatch:
    # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  duty-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config.py
            dutynotice.py
            dingtalk.py
            send_duty.py
            requirements.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check DingTalk config
        id: check_config
        run: |
          if [ -z "$DINGTALK_WEBHOOK" ] || [ -z "$DINGTALK_SECRET" ]; then
            echo "钉钉配置不完整，跳过推送"
            exit 1
          fi
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

      - name: Send DingTalk notification
        if: success()
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python3 send_duty.py
